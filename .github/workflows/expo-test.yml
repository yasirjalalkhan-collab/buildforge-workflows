name: Expo Go Test

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Setup mode'
        required: true
        type: choice
        options:
          - first_time
          - update
        default: 'update'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-expo-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-expo-

      - name: First time setup
        if: ${{ inputs.mode == 'first_time' }}
        run: echo "" | base64 -d | python3

      - name: Update mode setup
        if: ${{ inputs.mode == 'update' }}
        run: echo "" | base64 -d | python3

      - name: Install ngrok
        run: npm install -g @expo/ngrok@^4.1.0 || npm install -g ngrok

      - name: Start Expo Tunnel and capture URL
        run: |
          # Start expo in background, log output
          npx expo start --tunnel --no-dev 2>&1 | tee /tmp/expo_output.log &
          EXPO_PID=$!

          # Wait for URL
          echo "" | base64 -d | python3

          # Save URL
          if [ -f /tmp/expo_url.txt ]; then
            URL=$(cat /tmp/expo_url.txt)
            echo "==============================="
            echo "EXPO GO URL: $URL"
            echo "==============================="
            printf '{"url":"%s","mode":"%s","time":"%s"}' "$URL" "${{ inputs.mode }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > expo-test-url.json
          fi

          # Keep tunnel alive for 60 minutes
          echo "Tunnel active - keeping alive for 60 minutes..."
          sleep 3600
          kill $EXPO_PID 2>/dev/null || true

      - name: Upload URL artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-test-url
          path: expo-test-url.json
          retention-days: 1
