on:
  workflow_call:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        type: string
      pkg_name:
        description: 'Package Name'
        required: true
        type: string
      version:
        description: 'Version'
        required: true
        type: string
      orientation:
        description: 'Orientation'
        required: false
        type: string
        default: 'portrait'
      has_icon:
        description: 'Has icon.png'
        required: false
        type: string
        default: 'no'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Detect and fix Expo version
        run: |
          python3 << 'PYEOF'
          import json, subprocess, re

          with open('package.json') as f:
              pkg = json.load(f)

          deps = pkg.get('dependencies', {})
          expo_ver = deps.get('expo', '')
          asset_ver = deps.get('expo-asset', '')

          print('Detected expo: ' + expo_ver)
          print('Detected expo-asset: ' + asset_ver)

          m = re.search(r'(\d+)', expo_ver)
          major = int(m.group(1)) if m else 0
          print('Expo major version: ' + str(major))

          asset_map = {
            48: 'expo-asset@~8.0.0',
            49: 'expo-asset@~8.0.0',
            50: 'expo-asset@~9.0.0',
            51: 'expo-asset@~10.0.0',
            52: 'expo-asset@~11.0.4',
            53: 'expo-asset@~11.0.4',
            54: 'expo-asset@~11.0.4',
            55: 'expo-asset@~11.0.0',
          }

          to_install = []

          if not expo_ver:
            print('No expo found - adding expo@52')
            to_install.append('expo@~52.0.0')
            to_install.append('expo-asset@~11.0.4')
          elif major < 48:
            print('Expo ' + str(major) + ' too old - upgrading to 52')
            to_install.append('expo@~52.0.0')
            to_install.append('expo-asset@~11.0.4')
          else:
            if not asset_ver:
              asset_pkg = asset_map.get(major, 'expo-asset@~11.0.4')
              print('expo-asset missing - adding ' + asset_pkg)
              to_install.append(asset_pkg)
            print('Expo ' + str(major) + ' OK')

          if to_install:
            cmd = ['npm', 'install'] + to_install
            print('Running: ' + ' '.join(cmd))
            subprocess.run(cmd, check=True)
          else:
            print('All packages OK - no changes needed')
          PYEOF

      - name: Smart app.json update
        run: |
          python3 << 'PYEOF'
          import json, os, re

          with open('package.json') as f:
              pkg = json.load(f)

          deps = pkg.get('dependencies', {})
          expo_ver = deps.get('expo', '')
          m = re.search(r'(\d+)', expo_ver)
          major = int(m.group(1)) if m else 52
          print('Building with Expo ' + str(major))

          if os.path.exists('app.json'):
              with open('app.json') as f:
                  data = json.load(f)
          else:
              data = {}

          if 'expo' not in data:
              data['expo'] = {}

          data['expo']['name'] = '${{ inputs.app_name }}'
          data['expo']['android'] = data['expo'].get('android', {})
          data['expo']['android']['package'] = '${{ inputs.pkg_name }}'
          data['expo']['version'] = '${{ inputs.version }}'
          data['expo']['orientation'] = '${{ inputs.orientation }}'

          has_icon = '${{ inputs.has_icon }}'
          icon_exists = os.path.exists('icon.png')

          if has_icon == 'yes' and icon_exists:
              data['expo']['icon'] = './icon.png'
              print('Icon: set')
          else:
              data['expo'].pop('icon', None)
              print('Icon: not used')

          with open('app.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('app.json updated OK')
          PYEOF

      - name: Generate Android folder
        run: npx expo prebuild --platform android --no-install

      - name: Apply version info
        run: |
          sed -i "s/versionCode .*/versionCode 1/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ inputs.version }}\"/" android/app/build.gradle

      - name: Setup Keystore
        run: |
          if [ -f "android/release.keystore" ]; then
            cp android/release.keystore android/app/release.keystore
            echo "Keystore from repo"
          else
            keytool -genkey -v \
              -keystore android/app/release.keystore \
              -alias mykey \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass buildforge@2024 \
              -keypass buildforge@2024 \
              -dname "CN=BuildForge, O=BuildForge, C=US"
            echo "New keystore generated"
          fi
          python3 << 'PYEOF'
          content = open('android/app/build.gradle').read()
          if 'signingConfigs' not in content:
              signing = """
          android.signingConfigs {
            release {
              storeFile file('release.keystore')
              storePassword 'buildforge@2024'
              keyAlias 'mykey'
              keyPassword 'buildforge@2024'
            }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          """
              open('android/app/build.gradle', 'a').write(signing)
              print('Signing config added')
          else:
              print('Signing config already present')
          PYEOF

      - name: Fix Gradle Wrapper
        run: |
          GRADLE_VERSION=$(grep distributionUrl android/gradle/wrapper/gradle-wrapper.properties | grep -o '[0-9]*\.[0-9]*\.[0-9]*' | head -1)
          echo "Gradle version: $GRADLE_VERSION"
          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" || \
          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar"
          curl -sL -o android/gradlew \
            "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew"
          chmod +x android/gradlew

      - name: Fix Kotlin compatibility
        run: |
          cat >> android/build.gradle << 'EOF'

          allprojects {
              configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.9.25'
                      }
                  }
              }
          }
          EOF

      - name: Build APK + AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            --no-daemon \
            --max-workers 2 \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Collect outputs
        run: |
          APK=$(find android -name "*.apk" | grep -i release | head -1)
          AAB=$(find android -name "*.aab" | grep -i release | head -1)
          echo "APK: $APK"
          echo "AAB: $AAB"
          cp "$APK" "${{ inputs.app_name }}-v${{ inputs.version }}.apk"
          cp "$AAB" "${{ inputs.app_name }}-v${{ inputs.version }}.aab"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-v${{ inputs.version }}-APK
          path: ${{ inputs.app_name }}-v${{ inputs.version }}.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-v${{ inputs.version }}-AAB
          path: ${{ inputs.app_name }}-v${{ inputs.version }}.aab
          retention-days: 30
