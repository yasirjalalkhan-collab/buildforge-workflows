name: Build Electron EXE

on:
  workflow_call:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        type: string
      version:
        description: 'Version'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install electron-builder
        run: npm install --save-dev electron-builder

      - name: Add icon to config if exists
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          if (Test-Path "icon.ico") {
            Write-Host "icon.ico found - adding to build config"
            if (-not $pkg.build) {
              $pkg | Add-Member -MemberType NoteProperty -Name "build" -Value @{}
            }
            if (-not $pkg.build.win) {
              $pkg.build | Add-Member -MemberType NoteProperty -Name "win" -Value @{ icon = "icon.ico" } -Force
            }
          } else {
            Write-Host "No icon.ico - using default"
          }
          if (-not $pkg.build) {
            $pkg | Add-Member -MemberType NoteProperty -Name "build" -Value @{}
          }
          if (-not $pkg.build.appId) {
            $pkg.build | Add-Member -MemberType NoteProperty -Name "appId" -Value "com.buildforge.app" -Force
          }
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Build EXE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --win --x64

      - name: Find and upload EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "EXE found: $($exe.FullName)"
            Copy-Item $exe.FullName "${{ inputs.app_name }}-v${{ inputs.version }}.exe"
          } else {
            $msi = Get-ChildItem -Path dist -Filter "*.msi" | Select-Object -First 1
            if ($msi) {
              Copy-Item $msi.FullName "${{ inputs.app_name }}-v${{ inputs.version }}.msi"
            }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-v${{ inputs.version }}-Windows
          path: |
            ${{ inputs.app_name }}-v${{ inputs.version }}.exe
            ${{ inputs.app_name }}-v${{ inputs.version }}.msi
          retention-days: 30
