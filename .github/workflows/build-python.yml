name: Build Python EXE

on:
  workflow_call:
    inputs:
      app_name:
        description: 'EXE Name'
        required: true
        type: string
      entry_file:
        description: 'Entry Python File'
        required: true
        type: string
      icon_file:
        description: 'Icon File (.ico)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }

      - name: Build EXE with icon
        if: ${{ inputs.icon_file != '' }}
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed `
            --name "${{ inputs.app_name }}" `
            --icon="${{ inputs.icon_file }}" `
            ${{ inputs.entry_file }}

      - name: Build EXE without icon
        if: ${{ inputs.icon_file == '' }}
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed `
            --name "${{ inputs.app_name }}" `
            ${{ inputs.entry_file }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-Windows-EXE
          path: dist/${{ inputs.app_name }}.exe
          retention-days: 30
