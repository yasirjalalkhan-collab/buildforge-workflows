name: Expo Preview (EAS Update)

on:
  workflow_call:
    inputs:
      branch_name:
        description: 'Preview branch name'
        required: false
        type: string
        default: 'preview'
      channel:
        description: 'EAS channel'
        required: false
        type: string
        default: 'preview'
    secrets:
      EXPO_TOKEN:
        required: true

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Validate app.json
        run: echo "" | base64 -d | python3

      - name: Create eas.json if missing
        run: |
          [ -f "eas.json" ] && echo "exists" && exit 0
          echo '{"cli":{"version":">= 5.0.0"},"build":{"preview":{"distribution":"internal"}}}' > eas.json
          echo "eas.json created"

      - name: Run EAS Update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas update \
            --branch "${{ inputs.branch_name }}" \
            --message "BuildForge preview $(date -u +%Y%m%d-%H%M)" \
            --non-interactive \
            --json > /tmp/eas_out.json 2>&1 || true
          echo "=== EAS Output ===" && cat /tmp/eas_out.json | head -30

      - name: Extract and save preview URL
        run: |
          URL=$(echo "" | base64 -d | python3)
          echo "Preview URL: $URL"
          printf '{"url":"%s","branch":"%s","time":"%s"}' \
            "$URL" "${{ inputs.branch_name }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > preview-info.json
          cat preview-info.json

      - uses: actions/upload-artifact@v4
        with:
          name: expo-preview-info
          path: preview-info.json
          retention-days: 7
